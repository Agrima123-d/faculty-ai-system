spring.application.name=faculty-ai-system
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:file:./data/faculty-ai-db;MODE=MySQL;AUTO_SERVER=TRUE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:${MYSQLUSER:sa}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${MYSQLPASSWORD:}}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
server.servlet.session.timeout=30m
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
gemini.api.key=${GEMINI_API_KEY:your-gemini-key-here}
server.port=${PORT:8080}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
